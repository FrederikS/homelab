# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tinyauth
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      tinyauth:
        containers:
          app:
            image:
              repository: ghcr.io/steveiliop56/tinyauth
              tag: v5.0.4
            env:
              TZ: ${TIMEZONE}
              TINYAUTH_APPURL: https://tinyauth.${SECRET_DOMAIN}
              TINYAUTH_ANALYTICS_ENABLED: "false"
              TINYAUTH_AUTH_SECURECOOKIE: "true"
              TINYAUTH_AUTH_SESSIONEXPIRY: 604800
              TINYAUTH_OAUTH_PROVIDERS_KEYCLOAK_NAME: Keycloak
              TINYAUTH_OAUTH_PROVIDERS_KEYCLOAK_AUTHURL: https://iam.${SECRET_DOMAIN}/realms/${SECRET_DOMAIN}/protocol/openid-connect/auth
              TINYAUTH_OAUTH_PROVIDERS_KEYCLOAK_TOKENURL: https://iam.${SECRET_DOMAIN}/realms/${SECRET_DOMAIN}/protocol/openid-connect/token
              TINYAUTH_OAUTH_PROVIDERS_KEYCLOAK_USERINFOURL: https://iam.${SECRET_DOMAIN}/realms/${SECRET_DOMAIN}/protocol/openid-connect/userinfo
              TINYAUTH_OAUTH_PROVIDERS_KEYCLOAK_SCOPES: openid email profile groups
              TINYAUTH_OAUTH_PROVIDERS_KEYCLOAK_REDIRECTURL: https://tinyauth.${SECRET_DOMAIN}/api/oauth/callback/keycloak
            envFrom:
              - secretRef:
                  name: tinyauth-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: &port 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

    service:
      app:
        ports:
          http:
            port: *port

    ingress:
      app:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hosts:
          - host: &host "tinyauth.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          tinyauth:
            app:
              - path: /data
                subPath: data
