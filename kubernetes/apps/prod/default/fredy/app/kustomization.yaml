---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - "./pvc.yaml"
  - "./repository.yaml"
  - "./release.yaml"

configMapGenerator:
  - name: fredy
    files:
      - config.json=./resources/config.json
generatorOptions:
  disableNameSuffixHash: true
