---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app fredy
spec:
  chartRef:
    kind: OCIRepository
    name: fredy
  interval: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      fredy:
        # initContainers:
        #   init-chown:
        #     image:
        #       repository: busybox
        #       tag: 1.38.0
        #     command:
        #       - sh
        #       - -c
        #       - chown -R 1000:1000 /config /db /fredy
        #     securityContext:
        #       runAsUser: 0
        #       runAsNonRoot: false
        #       readOnlyRootFilesystem: true
        containers:
          app:
            image:
              repository: ghcr.io/orangecoding/fredy
              tag: 22.9.1
            env:
              TZ: ${TIMEZONE}
              NODE_ENV: production
            # securityContext:
            #   allowPrivilegeEscalation: false
            #   readOnlyRootFilesystem: true
            #   capabilities:
            #     drop:
            #       - ALL
            resources:
              requests:
                cpu: 50m
              limits:
                cpu: 1000m
                memory: 1G

    # defaultPodOptions:
    #   securityContext:
    #     runAsNonRoot: true
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     fsGroup: 1000
    #     fsGroupChangePolicy: OnRootMismatch
    #     seccompProfile:
    #       type: RuntimeDefault

    service:
      app:
        ports:
          http:
            port: 9998

    ingress:
      app:
        className: internal
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      # app:
      #   type: emptyDir
      #   advancedMounts:
      #     fredy:
      #       init-chown:
      #         - path: /fredy
      #       app:
      #         - path: /fredy
      data:
        existingClaim: *app
        advancedMounts:
          fredy:
            # init-chown:
            #   - path: /config
            #     subPath: config
            #   - path: /db
            #     subPath: db
            app:
              - path: /config
                subPath: config
              - path: /db
                subPath: db
      config:
        type: configMap
        name: *app
        advancedMounts:
          fredy:
            app:
              - path: /config/config.json
                subPath: config.json
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 256Mi
