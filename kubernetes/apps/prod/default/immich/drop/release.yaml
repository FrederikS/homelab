# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-drop
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      immich-drop:
        replicas: 0
        pod:
          nodeSelector:
            kubernetes.io/arch: amd64
        containers:
          main:
            image:
              repository: ghcr.io/nasogaa/immich-drop
              tag: v0.5.0
            env:
              CHUNKED_UPLOADS_ENABLED: "true"
              IMMICH_BASE_URL: http://immich-server:2283/api
              IMMICH_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: immich-drop-secret
                    key: IMMICH_API_KEY
              PUBLIC_UPLOAD_PAGE_ENABLED: "false"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      main:
        controller: immich-drop
        ports:
          http:
            port: 8080

    ingress:
      main:
        enabled: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          nginx.ingress.kubernetes.io/proxy-body-size: 10m
        hosts:
          - host: "drop.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - "drop.${SECRET_DOMAIN}"

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: immich-drop
        globalMounts:
          - path: /data

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
