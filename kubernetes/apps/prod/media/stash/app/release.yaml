# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stash
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      stash:
        pod:
          nodeSelector:
            role: media
        containers:
          app:
            image:
              repository: stashapp/stash
              tag: v0.31.0
            env:
              STASH_STASH: /media/
              STASH_BLOBS_PATH: /blobs
              STASH_BLOBS_STORAGE: FILESYSTEM
              STASH_GENERATED: /generated
              STASH_METADATA: /metadata
              STASH_CACHE: /cache
              STASH_PLUGINS_PATH: /plugins
              STASH_SCRAPERS_PATH: /scrapers
              STASH_CONFIG_FILE: /config/config.yml
              STASH_PORT: &port 9999
              STASH_NO_BROWSER: "true"
              USER: "1000"
              HOME: /config
              TZ: ${TIMEZONE}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 20m
                memory: 512Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    ingress:
      app:
        # annotations:
        #   nginx.ingress.kubernetes.io/auth-url: "http://tinyauth.auth.svc.cluster.local:3000/api/auth/nginx"
        #   nginx.ingress.kubernetes.io/auth-signin: "https://tinyauth.${SECRET_DOMAIN}/login"
        #   nginx.ingress.kubernetes.io/auth-signin-redirect-param: redirect_uri
        #   nginx.ingress.kubernetes.io/auth-response-headers: Remote-User
        #   nginx.ingress.kubernetes.io/auth-snippet: |
        #     proxy_set_header X-Forwarded-Host $host;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        className: internal
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      config:
        existingClaim: stash-config
        globalMounts:
          - path: /config
            subPath: config
          - path: /blobs
            subPath: blobs
          - path: /generated
            subPath: generated
          - path: /metadata
            subPath: metadata

      media:
        type: nfs
        server: ${NAS_SERVER_IP}
        path: /tank/media/downloads
        advancedMounts:
          stash:
            app:
              - path: /media
                subPath: manual/metube/video

      backups:
        type: nfs
        server: ${NAS_SERVER_IP}
        path: /tank/backups/apps/${APP}
        advancedMounts:
          stash:
            app:
              - path: /backups

      tmpfs:
        type: emptyDir
        advancedMounts:
          stash:
            app:
              - path: /cache
                subPath: cache
              - path: /root/.stash/logs
                subPath: logs
              - path: /tmp
                subPath: tmp
