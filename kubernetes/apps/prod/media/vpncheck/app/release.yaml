---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpncheck
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      vpncheck:
        strategy: Recreate
        initContainers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - (ip rule del table 51820; ip -6 rule del table 51820) || true
            restartPolicy: Always
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              capabilities:
                add: ["NET_ADMIN"]
              allowPrivilegeEscalation: true
            env:
              # Health server so Kubernetes knows when the tunnel is up
              HEALTH_SERVER_ADDRESS: ":9999"
              # Gluetun control API
              HTTP_CONTROL_SERVER_ADDRESS: ":8000"
              # Allow inbound traffic on the health port
              FIREWALL_INPUT_PORTS: "8000,9999"
              # No internal cluster subnets to bypass since this app
              # doesn't talk to any internal services.
              # If your app does, add your pod/service CIDRs here e.g.:
              FIREWALL_OUTBOUND_SUBNETS: 10.42.0.0/16,10.43.0.0/16
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: vpncheck-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  # Give the tunnel up to 5 minutes to come up
                  failureThreshold: 30
                  periodSeconds: 10
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  periodSeconds: 30
                  failureThreshold: 3

        containers:
          app:
            # A minimal image with curl available
            image:
              repository: curlimages/curl
              tag: latest
            # Loop forever: check public IP every 30s and print the result.
            # Mullvad's API returns JSON telling you:
            #   - your public IP
            #   - whether you're connected via Mullvad
            #   - which server/country you're on
            command:
              - /bin/sh
              - -c
              - sleep infinity # just keep the pod alive
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
