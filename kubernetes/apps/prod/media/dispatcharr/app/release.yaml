---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dispatcharr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      dispatcharr:
        # strategy: Recreate
        # initContainers:
        #   gluetun:
        #     image:
        #       repository: ghcr.io/qdm12/gluetun
        #       tag: v3.41.1
        #     lifecycle:
        #       postStart:
        #         exec:
        #           command:
        #             - /bin/sh
        #             - -c
        #             - (ip rule del table 51820; ip -6 rule del table 51820) || true
        #     restartPolicy: Always
        #     securityContext:
        #       runAsUser: 0
        #       runAsGroup: 0
        #       runAsNonRoot: false
        #       capabilities:
        #         add: ["NET_ADMIN"]
        #       allowPrivilegeEscalation: true
        #     env:
        #       # Health server so Kubernetes knows when the tunnel is up
        #       HEALTH_SERVER_ADDRESS: ":9999"
        #       # Gluetun control API
        #       HTTP_CONTROL_SERVER_ADDRESS: ":8000"
        #       # Allow inbound traffic on the health port
        #       FIREWALL_INPUT_PORTS: "8000,9191,9999"
        #       # No internal cluster subnets to bypass since this app
        #       # doesn't talk to any internal services.
        #       # If your app does, add your pod/service CIDRs here e.g.:
        #       FIREWALL_OUTBOUND_SUBNETS: 10.42.0.0/16,10.43.0.0/16
        #       TZ: ${TIMEZONE}
        #     envFrom:
        #       - secretRef:
        #           name: dispatcharr-gluetun-secret
        #     probes:
        #       startup:
        #         enabled: true
        #         custom: true
        #         spec:
        #           httpGet:
        #             path: /
        #             port: 9999
        #           # Give the tunnel up to 5 minutes to come up
        #           failureThreshold: 30
        #           periodSeconds: 10
        #       liveness:
        #         enabled: true
        #         custom: true
        #         spec:
        #           httpGet:
        #             path: /
        #             port: 9999
        #           periodSeconds: 30
        #           failureThreshold: 3

        containers:
          app:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.20.2
            env:
              CELERY_BROKER_URL: redis://localhost:6379/0
              DISPATCHARR_ENV: aio
              DISPATCHARR_LOG_LEVEL: info
              DISPATCHARR_PORT: &port 9191
              REDIS_HOST: localhost
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 3Gi

    service:
      app:
        ports:
          http:
            port: *port

    ingress:
      app:
        className: internal
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          dispatcharr:
            app:
              - path: /data
                subPath: data
      tmpfs:
        type: emptyDir
        advancedMounts:
          dispatcharr:
            app:
              - path: /tmp
                subPath: tmp
