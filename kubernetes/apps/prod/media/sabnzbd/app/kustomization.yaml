---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - "./secret.sops.yaml"
  - "./pvc.yaml"
  - "./release.yaml"

configMapGenerator:
  - name: sabnzbd-scripts
    files:
      - "./resources/scripts/clean_nzb_name.py"
      - "./resources/scripts/replace_for.py"
      - "./resources/scripts/post_process.sh"
generatorOptions:
  disableNameSuffixHash: true
