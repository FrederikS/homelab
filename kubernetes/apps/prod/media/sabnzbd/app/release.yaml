---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sabnzbd
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      sabnzbd:
        strategy: Recreate
        initContainers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - (ip rule del table 51820; ip -6 rule del table 51820) || true
            restartPolicy: Always
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              capabilities:
                add: ["NET_ADMIN"]
              allowPrivilegeEscalation: true
            env:
              # Health server so Kubernetes knows when the tunnel is up
              HEALTH_SERVER_ADDRESS: ":9999"
              # Gluetun control API
              HTTP_CONTROL_SERVER_ADDRESS: ":8000"
              HTTPPROXY: "on"
              HTTPPROXY_LISTENING_ADDRESS: ":8888"
              # Allow inbound traffic on the health port
              FIREWALL_INPUT_PORTS: "8000,8888,9999"
              # No internal cluster subnets to bypass since this app
              # doesn't talk to any internal services.
              # If your app does, add your pod/service CIDRs here e.g.:
              FIREWALL_OUTBOUND_SUBNETS: 10.42.0.0/16,10.43.0.0/16
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: sabnzbd-gluetun-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  # Give the tunnel up to 5 minutes to come up
                  failureThreshold: 30
                  periodSeconds: 10
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  periodSeconds: 30
                  failureThreshold: 3

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 4.5.5
            env:
              SABNZBD__PORT: &port 80
              SABNZBD__HOST_WHITELIST_ENTRIES: >-
                sabnzbd,
                sabnzbd.default,
                sabnzbd.default.svc,
                sabnzbd.default.svc.cluster,
                sabnzbd.default.svc.cluster.local,
                {{ .Release.Name }}.${SECRET_DOMAIN}
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: sabnzbd-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 20
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 15
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 20
                  failureThreshold: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2048Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        forceRename: *app
        ports:
          http:
            port: *port
      gluetun:
        ports:
          http:
            port: 8888
            protocol: TCP

    ingress:
      app:
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: 10m
        #   external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        className: internal
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      config:
        enabled: true
        existingClaim: *app
        advancedMounts:
          sabnzbd:
            app:
              - path: /config

      media:
        type: nfs
        server: ${NAS_SERVER_IP}
        path: /tank/media
        advancedMounts:
          sabnzbd:
            app:
              - path: /media

      backups:
        type: nfs
        server: ${NAS_SERVER_IP}
        path: /tank/backups/apps/${APP}
        advancedMounts:
          sabnzbd:
            app:
              - path: /config/backups

      scripts:
        type: configMap
        name: sabnzbd-scripts
        defaultMode: 0555
        advancedMounts:
          sabnzbd:
            app:
              - path: /scripts
                readOnly: true

      temp:
        type: emptyDir
        advancedMounts:
          sabnzbd:
            app:
              - path: /tmp
